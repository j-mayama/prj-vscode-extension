# ==================================================
# @see https://httpd.apache.org/docs/current/
# @see https://httpd.apache.org/docs/current/en/mod/directives.html
# ==================================================

# ==================================================
# 基本情報
# ==================================================
ServerRoot "/usr/local/apache2"
ServerName localhost
Listen 80

# ==================================================
# MPM（eventはPHP-FPM前提で最適）
# ==================================================
LoadModule mpm_event_module modules/mod_mpm_event.so

<IfModule mpm_event_module>
    StartServers             2
    MinSpareThreads         25
    MaxSpareThreads         75
    ThreadLimit             64
    ThreadsPerChild         25
    MaxRequestWorkers      150
    MaxConnectionsPerChild  0
</IfModule>

# ==================================================
# 必須モジュール
# ==================================================
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule access_compat_module modules/mod_access_compat.so
LoadModule unixd_module modules/mod_unixd.so

LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule env_module modules/mod_env.so
LoadModule alias_module modules/mod_alias.so
LoadModule setenvif_module modules/mod_setenvif.so

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_fcgi_module modules/mod_proxy_fcgi.so
LoadModule rewrite_module modules/mod_rewrite.so

# ==================================================
# 実行ユーザー（Docker前提）
# ==================================================
User daemon
Group daemon

# ==================================================
# MIME / Index
# ==================================================
TypesConfig conf/mime.types
DirectoryIndex index.php index.html

# ==================================================
# ログ（Docker標準）
# ==================================================
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined

# ==================================================
# Honor TLS termination at nginx
# ==================================================
SetEnvIf X-Forwarded-Proto https HTTPS=on
SetEnvIf X-Forwarded-Port 443 SERVER_PORT=443

# ==================================================
# DocumentRoot
# ==================================================
DocumentRoot "/var/www/html"

<Directory "/var/www/html">
    Options FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# ==================================================
# Allow .well-known for verification files
# ==================================================
<Directory "/var/www/html/.well-known">
    Require all granted
</Directory>

# ==================================================
# ルート外は明示的に拒否
# ==================================================
<Directory />
    Require all denied
</Directory>

# ==================================================
# PHP-FPM（サービス名 php 前提）
# ==================================================
<FilesMatch \.php$>
    SetHandler "proxy:fcgi://php:9000"
</FilesMatch>

# ==================================================
# .htaccess 直アクセス防止
# ==================================================
<FilesMatch "^\.">
    Require all denied
</FilesMatch>
