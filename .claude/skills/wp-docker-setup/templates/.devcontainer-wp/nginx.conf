# ==================================================
# @see https://nginx.org/en/docs/
# @see https://nginx.org/en/docs/dirindex.html
# ==================================================

# ==================================================
# Process model
# ==================================================
worker_processes auto;

events {
    # Connections per worker process
    worker_connections 1024;
}

http {
    # MIME types and defaults
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    # Sendfile and keepalive tuning
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 32m;

    # ==================================================
    # HTTP -> HTTPS redirect (dev uses 8080)
    # ==================================================
    server {
        listen 80;
        server_name localhost;
        return 301 https://$server_name:8080$request_uri;
    }

    # ==================================================
    # HTTPS reverse proxy to Apache (httpd)
    # ==================================================
    server {
        listen 443 ssl;
        server_name localhost;
        # Proxy to httpd service
        location / {
            proxy_pass http://httpd:80;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # TLS settings (local certs)
        ssl_certificate     /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Logs to container stdout/stderr
        access_log /dev/stdout;
        error_log /dev/stderr warn;

        # Minimal security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "same-origin" always;

        # Allow .well-known for verification files
        location ^~ /.well-known/ {
            allow all;
        }

        # Deny dotfiles
        location ~ /\. {
            deny all;
        }
    }
}
